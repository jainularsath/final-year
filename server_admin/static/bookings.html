<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>All Bookings – Admin</title>
    <link rel="stylesheet" href="/static/style.css" />
</head>

<body>
    <div class="app-layout">
        <aside class="sidebar">
            <div class="logo">🛡️ <span>Admin</span></div>
            <div class="sidebar-section">Overview</div><a class="sidebar-link" href="/index.html"><span
                    class="icon">📊</span>Dashboard</a>
            <div class="sidebar-section">Services</div>
            <a class="sidebar-link" href="/halls.html"><span class="icon">🏛️</span>Halls</a>
            <a class="sidebar-link" href="/catering.html"><span class="icon">🍽️</span>Catering</a>
            <a class="sidebar-link" href="/cars.html"><span class="icon">🚗</span>Cars</a>
            <a class="sidebar-link" href="/photography.html"><span class="icon">📸</span>Photography</a>
            <a class="sidebar-link" href="/decorations.html"><span class="icon">🌸</span>Decorations</a>
            <div class="sidebar-section">Users</div>
            <a class="sidebar-link" href="/vendors.html"><span class="icon">🏪</span>Vendors</a>
            <a class="sidebar-link" href="/users.html"><span class="icon">👥</span>Users</a>
            <a class="sidebar-link active" href="/bookings.html"><span class="icon">📋</span>All Bookings</a>
            <div class="sidebar-section">Account</div>
            <a class="sidebar-link sidebar-logout" href="/api/logout"><span class="icon">🚪</span>Logout</a>
        </aside>
        <main class="main-content">
            <div class="page-title">All Bookings</div>
            <p class="page-subtitle">Platform-wide booking history (latest 200)</p>
            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Customer</th>
                            <th>Service</th>
                            <th>Type</th>
                            <th>Event Date</th>
                            <th>People</th>
                            <th>Total</th>
                            <th>Advance</th>
                            <th>Status</th>
                            <th>Booked On</th>
                        </tr>
                    </thead>
                    <tbody id="bookings-body">
                        <tr>
                            <td colspan="10" class="loading-state">
                                <div class="spinner"></div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </main>
    </div>
    <div class="toast-container" id="toast-container"></div>
    <script src="/static/common.js"></script>
    <script>
        const SERVICE_ICONS = { hall: '🏛️', catering: '🍽️', luxury_car: '🚗', photography: '📸', decorations: '🌸' };
        document.addEventListener('DOMContentLoaded', async () => {
            const r = await fetch('/api/me'); if (!r.ok) { location.href = '/login.html'; return; } loadBookings();
        });
        async function loadBookings() {
            const tbody = document.getElementById('bookings-body');
            try {
                const bookings = await fetch('/api/admin/bookings').then(r => r.json());
                if (!bookings.length) { tbody.innerHTML = '<tr><td colspan="10" class="empty-state">No bookings yet.</td></tr>'; return; }
                tbody.innerHTML = bookings.map(b => `<tr>
        <td>#${b.id}</td>
        <td>${esc(b.customer_name || '—')}</td>
        <td>${SERVICE_ICONS[b.service_type] || '📦'} ${esc((b.service_name || '').substring(0, 20))}</td>
        <td><span class="badge">${esc(b.service_type.replace('_', ' '))}</span></td>
        <td>${formatDate(b.date)}</td>
        <td>${b.total_people || '—'}</td>
        <td style="font-weight:700;color:var(--clr-gold)">${formatCurrency(b.total_amount)}</td>
        <td>${formatCurrency(b.advance_amount)}</td>
        <td>${statusBadge(b.status)}</td>
        <td>${formatDate(b.created_at)}</td>
      </tr>`).join('');
            } catch (e) { tbody.innerHTML = '<tr><td colspan="10" style="text-align:center;padding:2rem;color:var(--clr-muted)">Failed to load.</td></tr>'; }
        }
    </script>
</body>

</html>
