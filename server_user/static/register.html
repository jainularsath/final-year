<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>Register – TN Events</title>
    <link rel="stylesheet" href="/static/style.css" />
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: var(--gradient-hero);
            padding: 2rem 0;
        }

        .auth-box {
            background: var(--clr-surface);
            border: 1px solid var(--clr-border);
            border-radius: var(--radius-lg);
            padding: 2.5rem;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 24px 64px rgba(0, 0, 0, .6);
        }

        .auth-logo {
            text-align: center;
            margin-bottom: 2rem;
        }

        .auth-logo h1 {
            font-size: 1.8rem;
            font-family: 'Outfit', sans-serif;
            font-weight: 800;
        }

        .auth-logo h1 span {
            background: var(--gradient-gold);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .err-msg {
            background: rgba(239, 68, 68, .1);
            border: 1px solid rgba(239, 68, 68, .3);
            color: var(--clr-red);
            border-radius: var(--radius-sm);
            padding: .7rem 1rem;
            font-size: .875rem;
            margin-bottom: 1rem;
            display: none;
        }

        .success-box {
            background: rgba(34, 197, 94, .1);
            border: 1px solid rgba(34, 197, 94, .3);
            color: var(--clr-green);
            border-radius: var(--radius-sm);
            padding: 1rem;
            text-align: center;
            display: none;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }
    </style>
</head>

<body>
    <div class="auth-box">
        <div class="auth-logo">
            <h1>🎊 <span>TN</span>Events</h1>
            <p>Create your free account</p>
        </div>
        <div class="err-msg" id="err-msg"></div>
        <div class="success-box" id="success-box"></div>
        <form id="reg-form" onsubmit="doRegister(event)">
            <div class="form-row">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="name" class="form-control" placeholder="Arun Kumar" required />
                </div>
                <div class="form-group">
                    <label>Phone</label>
                    <input type="tel" id="phone" class="form-control" placeholder="9xxxxxxxxx" />
                </div>
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="email" class="form-control" placeholder="you@example.com" required />
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" class="form-control" placeholder="Min 6 characters" required
                    minlength="6" />
            </div>
            <button type="submit" class="btn btn-primary" id="btn-submit"
                style="width:100%;justify-content:center;margin-top:.5rem">
                Create Account
            </button>
        </form>
        <p style="text-align:center;font-size:.9rem;color:var(--clr-muted);margin-top:1.5rem">
            Already have an account? <a href="/login.html">Login</a>
        </p>
        <p style="text-align:center;font-size:.8rem;color:var(--clr-muted);margin-top:.5rem">
            Are you a vendor? <a href="http://localhost:3001/register.html">Register as Vendor →</a>
        </p>
    </div>
    <div class="toast-container" id="toast-container"></div>
    <script src="/static/common.js"></script>
    <script>
        async function doRegister(e) {
            e.preventDefault();
            const btn = document.getElementById('btn-submit');
            btn.disabled = true; btn.textContent = 'Creating…';
            const errEl = document.getElementById('err-msg');
            errEl.style.display = 'none';
            try {
                const res = await fetch('/api/register', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        name: document.getElementById('name').value,
                        email: document.getElementById('email').value,
                        phone: document.getElementById('phone').value,
                        password: document.getElementById('password').value
                    })
                });
                const data = await res.json();
                if (!res.ok) { errEl.textContent = data.error; errEl.style.display = 'block'; return; }
                const successEl = document.getElementById('success-box');
                successEl.innerHTML = '✅ Account created! Redirecting…';
                successEl.style.display = 'block';
                document.getElementById('reg-form').style.display = 'none';
                setTimeout(() => location.href = '/', 1200);
            } catch (err) {
                errEl.textContent = 'Network error'; errEl.style.display = 'block';
            } finally { btn.disabled = false; btn.textContent = 'Create Account'; }
        }
    </script>
</body>

</html>
