<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>Login – TN Events</title>
    <link rel="stylesheet" href="/static/style.css" />
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: url('/static/login-bg.png') no-repeat center center fixed;
            background-size: cover;
            position: relative;
        }

        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            /* dark overlay */
            backdrop-filter: blur(8px);
            /* blurry effect */
            z-index: -1;
        }

        .auth-box {
            background: var(--clr-surface);
            border: 1px solid var(--clr-border);
            border-radius: var(--radius-lg);
            padding: 2.5rem;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 24px 64px rgba(0, 0, 0, .6);
        }

        .auth-logo {
            text-align: center;
            margin-bottom: 2rem;
        }

        .auth-logo h1 {
            font-size: 1.8rem;
            font-family: 'Outfit', sans-serif;
            font-weight: 800;
            color: var(--clr-text);
        }

        .auth-logo h1 span {
            background: var(--gradient-gold);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .auth-logo p {
            color: var(--clr-muted);
            font-size: .9rem;
            margin-top: .25rem;
        }

        .divider {
            height: 1px;
            background: var(--clr-border);
            margin: 1.5rem 0;
        }

        .err-msg {
            background: rgba(239, 68, 68, .1);
            border: 1px solid rgba(239, 68, 68, .3);
            color: var(--clr-red);
            border-radius: var(--radius-sm);
            padding: .7rem 1rem;
            font-size: .875rem;
            margin-bottom: 1rem;
            display: none;
        }
    </style>
</head>

<body>
    <div class="auth-box">
        <div class="auth-logo">
            <h1>🎊 <span>TN</span>Events</h1>
            <p>Welcome back — log in to your account</p>
        </div>
        <div class="err-msg" id="err-msg"></div>
        <form id="login-form" onsubmit="doLogin(event)">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="email" class="form-control" placeholder="you@example.com" required
                    autocomplete="email" />
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" class="form-control" placeholder="••••••••" required
                    autocomplete="current-password" />
            </div>
            <button type="submit" class="btn btn-primary" id="btn-submit"
                style="width:100%;justify-content:center;margin-top:.5rem">
                Login
            </button>
        </form>
        <div class="divider"></div>
        <p style="text-align:center;font-size:.9rem;color:var(--clr-muted)">
            Don't have an account? <a href="/register.html">Sign Up</a>
        </p>
    </div>
    <div class="toast-container" id="toast-container"></div>
    <script src="/static/common.js"></script>
    <script>
        // Redirect if already logged in
        fetch('/api/me').then(r => { if (r.ok) location.href = '/'; });

        async function doLogin(e) {
            e.preventDefault();
            const btn = document.getElementById('btn-submit');
            btn.disabled = true; btn.textContent = 'Logging in…';
            const errEl = document.getElementById('err-msg');
            errEl.style.display = 'none';

            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: document.getElementById('email').value,
                        password: document.getElementById('password').value
                    })
                });
                const data = await res.json();
                if (!res.ok) {
                    errEl.textContent = data.error || 'Login failed';
                    errEl.style.display = 'block';
                    return;
                }
                toast('Login successful! Redirecting…', 'success');
                // Check if there's a booking redirect
                const redirect = sessionStorage.getItem('booking_redirect');
                sessionStorage.removeItem('booking_redirect');
                setTimeout(() => location.href = redirect || '/', 800);
            } catch (err) {
                errEl.textContent = 'Network error. Is the backend running?';
                errEl.style.display = 'block';
            } finally {
                btn.disabled = false; btn.textContent = 'Login';
            }
        }
    </script>
</body>

</html>
